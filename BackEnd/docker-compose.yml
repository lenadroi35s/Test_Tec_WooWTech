services:
  postgreSQL:
    image: postgres:16-alpine
    container_name: woow_postgres
    restart: always
    environment:
      POSTGRES_DB: woow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
